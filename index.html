<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body data-base="." class="home-min">

<a href="#main" class="skip-link">Zum Inhalt springen</a>

<!-- TRANSPARENT NAV -->
<nav class="nav nav-transparent" id="nav">
  <a href="./" class="nav-logo">
    <span class="nav-logo-mark"></span>
    <span data-text="brand">Sonnenblick</span>
  </a>
  <div class="nav-links">
    <a href="wohnung/">Wohnung</a>
    <a href="galerie/">Galerie</a>
    <a href="lage/">Ort</a>
    <a href="aktivitaeten/">Aktivitäten</a>
    <a href="preise/">Preise</a>
    <a href="buchen/">Buchen</a>
    <a href="kontakt/">Kontakt</a>
  </div>
  <a href="buchen/" class="btn btn-primary nav-cta">Jetzt buchen</a>
  <button class="nav-toggle" aria-label="Menü öffnen" id="navToggle"><span></span></button>
</nav>

<!-- SPLIT HERO -->
<main class="home-split" id="main">
  <!-- Left: brand on cream -->
  <section class="home-split-content">
    <div class="brand-stack reveal">
      <svg class="brand-mark" viewBox="0 0 260 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Sun: filled gold disc, partially behind central peak -->
        <circle class="sun-disc" cx="130" cy="48" r="26" />
        <!-- 3 mountain peaks: solid filled silhouettes (center shorter so sun shows) -->
        <path d="M14 118 L66 62 L114 118 Z" fill="currentColor" />
        <path d="M78 118 L130 34 L186 118 Z" fill="currentColor" />
        <path d="M156 118 L204 56 L246 118 Z" fill="currentColor" />
        <!-- Thin baseline -->
        <line x1="0" y1="124" x2="260" y2="124" stroke="currentColor" stroke-width="1" stroke-opacity="0.3" />
      </svg>
      <div class="brand-name">SONNENBLICK</div>
      <div class="brand-sub"><span>Bartholomäberg Mountain Retreat</span></div>
    </div>
    <div class="home-split-cta reveal reveal-delay-2">
      <a href="buchen/" class="btn btn-gold">Verfügbarkeit prüfen
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
    <div class="home-loc-chip">Montafon · Vorarlberg · Österreich</div>
  </section>

  <!-- Right: mountain photo -->
  <aside class="home-split-image">
    <img id="heroImg" alt="Alpenpanorama Bartholomäberg im Montafon" loading="eager" />
  </aside>
</main>

<!-- Hidden admin dot -->
<div class="admin-dot" id="adminDot" title=""></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
